    steps:
    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        # Передаем ключ напрямую, action сам его обработает
        key: ${{ secrets.SSH_PRIVATE_KEY }} 
        # Если вы сделали Base64 шаг выше, раскомментируйте строку ниже и удалите просто key:
        # key: ${{ secrets.SSH_PRIVATE_KEY }}
        # Важно: Если использовали base64, appleboy/ssh-action обычно сам декодирует, 
        # но если ошибка повторится, нужно будет добавить скрипт распаковки.
        
        script: |
          cd /root/taskAIbot
          git pull origin main
          sudo systemctl restart deadlinebot
          echo "Bot updated and restarted!"
